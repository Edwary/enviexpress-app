<div class="flex h-screen bg-gray-100">
  <aside class="w-64 bg-[#000022] text-white flex flex-col shadow-lg">
    <div class="h-16 flex items-center justify-center border-b border-gray-700">
      <h1 class="text-xl font-bold">ViApp</h1>
    </div>
    <nav class="flex-1 overflow-y-auto py-4">
      <ul class="space-y-2 px-2">
        @for (item of menuItems; track item.id) {
          <li>
            <a [routerLink]="item.ruta" class="flex items-center gap-3 px-4 py-3 rounded hover:bg-blue-600 transition-colors">
              <mat-icon>{{ item.icono || 'folder' }}</mat-icon>
              <span>{{ item.nombre }}</span>
            </a>
          </li>
        }
      </ul>
    </nav>
  </aside>

  <main class="flex-1 overflow-y-auto">
    <router-outlet></router-outlet> 
  </main>
</div>
