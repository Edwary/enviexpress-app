@if (cargandoMenu) {
  <div class="flex items-center justify-center h-screen bg-slate-900 w-full text-white">
    <div class="flex flex-col items-center">
      <svg class="animate-spin -ml-1 mr-3 h-10 w-10 text-white mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <span class="text-lg">Configurando tu espacio...</span>
    </div>
  </div>
} @else {
  <div class="flex h-screen">
    
    <aside class="w-64 bg-slate-900 text-white flex flex-col">
      <div class="p-6 text-center font-bold text-xl border-b border-slate-700">
        enviexpress test
      </div>
      
      <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
        @for (item of menuItems; track item.id) {
          
          <div>
            <button 
              (click)="toggleMenu(item)" 
              class="w-full flex items-center justify-between px-4 py-3 rounded-lg hover:bg-slate-800 transition-colors cursor-pointer">
              
              <div class="flex items-center gap-3">
                <mat-icon>folder</mat-icon> <span>{{ item.name }}</span>
              </div>

              @if (item.children && item.children.length > 0) {
                <mat-icon>{{ item.expandido ? 'expand_less' : 'expand_more' }}</mat-icon>
              }
            </button>

            @if (item.expandido && item.children && item.children.length > 0) {
              <div class="ml-8 mt-1 space-y-1 border-l border-slate-700 pl-2">
                @for (child of item.children; track child.id) {
                  <button 
                    (click)="toggleMenu(child)"
                    class="w-full text-left px-4 py-2 text-sm text-slate-300 rounded-lg hover:text-white hover:bg-slate-800 transition-colors">
                    {{ child.name }}
                  </button>
                }
              </div>
            }
          </div>

        }
      </nav>
    </aside>

    <main class="flex-1 bg-gray-50 overflow-y-auto">
      <router-outlet></router-outlet>
    </main>

  </div>
}
